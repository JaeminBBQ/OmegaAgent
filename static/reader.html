<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OmegaReader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
        body { font-family: 'Georgia', 'Times New Roman', serif; background: #0d1117; color: #c9d1d9; }

        /* --- Screens --- */
        .screen { display: none; height: 100%; flex-direction: column; overflow: hidden; }
        .screen.active { display: flex; }

        /* --- Top Bar --- */
        .top-bar {
            background: #161b22; border-bottom: 1px solid #30363d;
            padding: 10px 16px; display: flex; align-items: center; gap: 12px;
            flex-shrink: 0; min-height: 52px;
        }
        .top-bar h1 { font-size: 1.1em; color: #58a6ff; }
        .top-bar .subtitle { color: #8b949e; font-size: 0.85em; }
        .top-bar .spacer { flex: 1; }
        .top-bar button {
            background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
            padding: 8px 16px; border-radius: 8px; font-size: 0.9em;
            cursor: pointer; min-height: 40px;
        }
        .top-bar button:active { background: #30363d; }

        /* --- Library Screen --- */
        .book-grid {
            flex: 1; overflow-y: auto; padding: 16px;
            display: grid; grid-template-columns: 1fr; gap: 12px;
            align-content: start;
        }
        .book-card {
            background: #161b22; border: 2px solid #30363d; border-radius: 12px;
            padding: 20px; cursor: pointer; transition: border-color 0.15s;
            min-height: 80px; display: flex; flex-direction: column; justify-content: center;
        }
        .book-card:active { border-color: #58a6ff; background: #1c2333; }
        .book-card h3 { color: #e6edf3; font-size: 1.1em; margin-bottom: 4px; }
        .book-card .meta { color: #8b949e; font-size: 0.85em; }
        .book-card .progress-bar {
            margin-top: 8px; height: 6px; background: #21262d; border-radius: 3px; overflow: hidden;
        }
        .book-card .progress-fill { height: 100%; background: #238636; border-radius: 3px; }
        .empty-state {
            text-align: center; color: #8b949e; padding: 60px 20px;
            font-size: 1.1em; line-height: 1.6;
        }

        /* --- Chapter List Screen --- */
        .chapter-list { flex: 1; overflow-y: auto; padding: 12px; }
        .chapter-item {
            background: #161b22; border: 1px solid #30363d; border-radius: 10px;
            padding: 16px 20px; margin-bottom: 8px; cursor: pointer;
            display: flex; align-items: center; gap: 12px; min-height: 56px;
        }
        .chapter-item:active { border-color: #58a6ff; background: #1c2333; }
        .chapter-item .ch-num {
            color: #8b949e; font-size: 0.85em; min-width: 30px; text-align: center;
        }
        .chapter-item .ch-title { flex: 1; font-size: 0.95em; }
        .chapter-item .ch-check { color: #238636; font-size: 1.2em; }
        .chapter-item.current { border-color: #58a6ff; }
        .continue-btn {
            display: block; margin: 12px; padding: 16px;
            background: #238636; color: white; border: none; border-radius: 12px;
            font-size: 1.1em; font-weight: bold; cursor: pointer; text-align: center;
        }
        .continue-btn:active { background: #2ea043; }

        /* --- Reader Screen --- */
        .reader-body {
            flex: 1; display: flex; align-items: flex-start; justify-content: center;
            padding: 20px 24px; overflow-y: auto; position: relative;
            min-height: 0;
        }
        .page-text {
            font-size: 1.2em; line-height: 1.7; max-width: 640px; width: 100%;
            text-align: left; white-space: pre-wrap;
        }
        .page-text .chunk {
            display: inline; padding: 2px 0; transition: background-color 0.2s;
        }
        .page-text .chunk.active {
            background: #1f6feb44; border-radius: 4px;
        }
        .page-text .chunk.done {
            color: #8b949e;
        }

        /* Touch zones for page turning */
        .touch-zone {
            position: absolute; top: 0; bottom: 0; width: 25%;
            z-index: 10; cursor: pointer;
        }
        .touch-zone.left { left: 0; }
        .touch-zone.right { right: 0; }
        .touch-zone:active { background: rgba(255,255,255,0.03); }

        /* --- Reader Controls --- */
        .reader-controls {
            background: #161b22; border-top: 1px solid #30363d;
            padding: 10px 16px; display: flex; align-items: center; gap: 10px;
            flex-shrink: 0;
        }
        .ctrl-btn {
            border: 1px solid #30363d; border-radius: 10px;
            padding: 12px 20px; font-size: 1em; cursor: pointer;
            min-height: 48px; min-width: 48px; display: flex;
            align-items: center; justify-content: center;
            background: #21262d; color: #c9d1d9;
        }
        .ctrl-btn:active { background: #30363d; }
        .ctrl-btn.play {
            background: #238636; color: white; border-color: #238636;
            flex: 1; font-weight: bold; font-size: 1.1em;
        }
        .ctrl-btn.play:active { background: #2ea043; }
        .ctrl-btn.play.playing { background: #da3633; border-color: #da3633; }
        .ctrl-btn:disabled { opacity: 0.4; }

        /* Progress bar in reader */
        .reader-progress {
            height: 4px; background: #21262d; flex-shrink: 0;
        }
        .reader-progress-fill { height: 100%; background: #58a6ff; transition: width 0.3s; }

        /* --- Voice Picker --- */
        .voice-picker {
            display: none; position: fixed; bottom: 70px; left: 16px; right: 16px;
            background: #161b22; border: 1px solid #30363d; border-radius: 12px;
            padding: 12px; max-height: 50vh; overflow-y: auto; z-index: 50;
        }
        .voice-picker.open { display: block; }
        .voice-option {
            padding: 12px 16px; border-radius: 8px; cursor: pointer;
            font-size: 1em; margin-bottom: 4px;
        }
        .voice-option:active, .voice-option.selected { background: #1f6feb33; color: #58a6ff; }

        /* Speed control */
        .speed-control { display: flex; align-items: center; gap: 8px; }
        .speed-control span { color: #8b949e; font-size: 0.85em; min-width: 40px; }

        /* --- Mic / Voice Command --- */
        .mic-btn {
            width: 48px; height: 48px; border-radius: 50%; border: 2px solid #30363d;
            background: #21262d; color: #c9d1d9; font-size: 1.2em;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .mic-btn:active { background: #30363d; }
        .mic-btn.recording { background: #da3633; border-color: #da3633; color: white; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }

        .voice-overlay {
            position: fixed; inset: 0; background: #0d1117ee;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 150; padding: 24px;
        }
        .voice-overlay.hidden { display: none; }
        .voice-overlay .status { color: #58a6ff; font-size: 1.3em; margin-bottom: 20px; text-align: center; }
        .voice-overlay .transcript { color: #8b949e; font-size: 0.95em; margin-bottom: 12px; max-width: 500px; text-align: center; }
        .voice-overlay .response {
            color: #e6edf3; font-size: 1em; line-height: 1.6; max-width: 500px;
            max-height: 50vh; overflow-y: auto; text-align: left;
            background: #161b22; border: 1px solid #30363d; border-radius: 10px;
            padding: 16px; white-space: pre-wrap; width: 100%;
        }
        .voice-overlay .close-btn {
            margin-top: 16px; padding: 12px 32px; background: #21262d; color: #c9d1d9;
            border: 1px solid #30363d; border-radius: 8px; font-size: 1em; cursor: pointer;
        }
        .stop-btn {
            width: 80px; height: 80px; border-radius: 50%; border: 3px solid #da3633;
            background: #da3633; color: white; font-size: 1em; font-weight: bold;
            cursor: pointer; margin-bottom: 20px; animation: pulse 1s infinite;
        }
        .stop-btn:active { background: #b62324; }

        .stt-toggle {
            padding: 4px 10px; border-radius: 12px; border: 1px solid #30363d;
            background: #21262d; color: #8b949e; font-size: 0.75em; cursor: pointer;
            margin-right: 6px;
        }
        .stt-toggle:active { background: #30363d; }
        .stt-toggle .mode { color: #58a6ff; }

        /* --- Loading overlay --- */
        .loading-overlay {
            position: fixed; inset: 0; background: #0d1117ee;
            display: flex; align-items: center; justify-content: center;
            z-index: 100; font-size: 1.2em; color: #8b949e;
        }
        .loading-overlay.hidden { display: none; }

        /* --- Notification toast --- */
        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #30363d; color: #e6edf3; padding: 10px 20px;
            border-radius: 8px; font-size: 0.9em; z-index: 200;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<!-- Loading overlay -->
<div class="loading-overlay hidden" id="loading">Loading...</div>
<div class="toast" id="toast"></div>

<!-- ==================== LIBRARY SCREEN ==================== -->
<div class="screen active" id="screenLibrary">
    <div class="top-bar">
        <h1>OmegaReader</h1>
        <div class="spacer"></div>
        <button class="stt-toggle" id="sttToggle" onclick="toggleSttMode()">STT: <span class="mode" id="sttModeLabel">Browser</span></button>
        <button class="mic-btn" id="micBtn" onclick="toggleVoiceCommand()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg></button>
    </div>
    <div class="book-grid" id="bookGrid">
        <div class="empty-state">Loading books...</div>
    </div>
</div>

<!-- ==================== CHAPTERS SCREEN ==================== -->
<div class="screen" id="screenChapters">
    <div class="top-bar">
        <button onclick="showScreen('library')">← Back</button>
        <div>
            <h1 id="chapBookTitle">Book Title</h1>
            <div class="subtitle" id="chapBookMeta"></div>
        </div>
    </div>
    <button class="continue-btn" id="continueBtn" onclick="continueReading()">
        ▶ Continue Reading
    </button>
    <div class="chapter-list" id="chapterList"></div>
</div>

<!-- ==================== READER SCREEN ==================== -->
<div class="screen" id="screenReader">
    <div class="top-bar">
        <button onclick="showScreen('chapters')">← Ch</button>
        <div>
            <span id="readerChTitle" style="color:#58a6ff;font-weight:bold"></span>
        </div>
        <div class="spacer"></div>
        <span class="subtitle" id="readerProgress"></span>
        <button onclick="toggleVoicePicker()" id="btnVoice" style="font-size:0.8em">Voice</button>
    </div>
    <div class="reader-progress"><div class="reader-progress-fill" id="progressFill" style="width:0%"></div></div>

    <div class="reader-body" id="readerBody">
        <div class="touch-zone left" onclick="prevPage()"></div>
        <div class="page-text" id="pageText"></div>
        <div class="touch-zone right" onclick="nextPage()"></div>
    </div>

    <div class="reader-controls">
        <div class="speed-control">
            <span id="speedLabel">1.0x</span>
            <input type="range" min="0.6" max="1.6" step="0.1" value="1.0"
                   oninput="setSpeed(this.value)" style="width:60px;accent-color:#58a6ff">
        </div>
        <button class="ctrl-btn" onclick="prevChapter()">&laquo; Prev</button>
        <button class="ctrl-btn play" id="btnPlay" onclick="togglePlay()">&#9654; Play</button>
        <button class="ctrl-btn" onclick="nextChapter()">Next &raquo;</button>
        <button class="ctrl-btn" onclick="summarizeChapter()" id="btnSummary">Summary</button>
    </div>
</div>

<!-- Voice picker overlay -->
<div class="voice-picker" id="voicePicker"></div>

<!-- Voice command overlay -->
<div class="voice-overlay hidden" id="voiceOverlay">
    <div class="status" id="voiceStatus">Recording...</div>
    <button class="stop-btn" id="stopBtn" onclick="stopVoiceRecording()">STOP</button>
    <div class="transcript" id="voiceTranscript"></div>
    <div class="response hidden" id="voiceResponse"></div>
    <button class="close-btn hidden" id="closeBtn" onclick="closeVoiceOverlay()">Close</button>
</div>

<!-- ==================== SUMMARY SCREEN ==================== -->
<div class="screen" id="screenSummary">
    <div class="top-bar">
        <button onclick="showScreen('reader')">← Back</button>
        <h1>Chapter Summary</h1>
    </div>
    <div style="flex:1;overflow-y:auto;padding:20px;line-height:1.7;font-size:1.05em" id="summaryContent">
        Generating summary...
    </div>
</div>

<script>
// ---------------------------------------------------------------------------
// Configuration
// ---------------------------------------------------------------------------
const OMEGA = window.location.origin;
const KOKORO = `http://${window.location.hostname}:8000`;

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let books = [];
let currentBook = null;     // book metadata + progress
let currentChapters = [];   // chapter list from OmegaAgent
let pages = [];             // paginated chunks for current section
let pageIndex = 0;
let ttsChunks = [];         // Kokoro chunks for current page
let ttsChunkIndex = 0;
let isPlaying = false;
let ttsAudio = null;
let selectedVoice = 'af_heart';
let ttsSpeed = 1.0;
let voices = [];

// ---------------------------------------------------------------------------
// Screen navigation
// ---------------------------------------------------------------------------
function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
    document.getElementById('voicePicker').classList.remove('open');
    if (name === 'library') loadBooks();
}

function showLoading(msg) {
    const el = document.getElementById('loading');
    el.textContent = msg || 'Loading...';
    el.classList.remove('hidden');
}
function hideLoading() { document.getElementById('loading').classList.add('hidden'); }

function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
}

// ---------------------------------------------------------------------------
// Library
// ---------------------------------------------------------------------------
async function loadBooks() {
    try {
        const resp = await fetch(`${OMEGA}/reading/books`);
        const data = await resp.json();
        books = data.books;
        renderBooks();
    } catch (e) {
        document.getElementById('bookGrid').innerHTML =
            '<div class="empty-state">Cannot connect to server.<br>Check that OmegaAgent is running.</div>';
    }
}

function renderBooks() {
    const grid = document.getElementById('bookGrid');
    if (books.length === 0) {
        grid.innerHTML = '<div class="empty-state">No books yet.<br><br>Upload EPUBs from any computer at:<br><strong>' + OMEGA + '/reading/ui</strong></div>';
        return;
    }
    grid.innerHTML = books.map(b => `
        <div class="book-card" onclick="openBook('${b.book_id}')">
            <h3>${b.title}</h3>
            <div class="meta">${b.author} · ${b.chapter_count} ch · ${b.total_words.toLocaleString()} words</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${b.progress.percent}%"></div></div>
            <div class="meta" style="margin-top:4px">${b.progress.percent}% · Chapter ${b.progress.chapter_index + 1}</div>
        </div>
    `).join('');
}

// ---------------------------------------------------------------------------
// Chapter list
// ---------------------------------------------------------------------------
async function openBook(bookId) {
    showLoading('Loading book...');
    try {
        const [bookResp, chapResp] = await Promise.all([
            fetch(`${OMEGA}/reading/books/${bookId}`),
            fetch(`${OMEGA}/reading/books/${bookId}/chapters`),
        ]);
        currentBook = await bookResp.json();
        const chapData = await chapResp.json();
        currentChapters = chapData.chapters;
        renderChapters();
        showScreen('chapters');
    } catch (e) {
        toast('Failed to load book');
    }
    hideLoading();
}

function renderChapters() {
    const b = currentBook;
    const prog = b.progress || {};
    document.getElementById('chapBookTitle').textContent = b.title;
    document.getElementById('chapBookMeta').textContent = `${b.author} · ${b.chapter_count} chapters`;

    const currentCh = prog.chapter_index || 0;
    const completed = prog.completed_chapters || [];
    document.getElementById('continueBtn').textContent =
        `▶ Continue from Chapter ${currentCh + 1}`;

    const list = document.getElementById('chapterList');
    list.innerHTML = currentChapters.map((ch, i) => `
        <div class="chapter-item ${i === currentCh ? 'current' : ''}"
             onclick="jumpToChapter(${i})">
            <span class="ch-num">${i + 1}</span>
            <span class="ch-title">${ch.title}</span>
            ${(Array.isArray(completed) ? completed : []).includes(i) ? '<span class="ch-check">✓</span>' : ''}
        </div>
    `).join('');
}

async function jumpToChapter(index) {
    showLoading('Loading chapter...');
    try {
        await fetch(`${OMEGA}/reading/books/${currentBook.book_id}/progress`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chapter_index: index, position: 0 }),
        });
        // Refresh book data
        const resp = await fetch(`${OMEGA}/reading/books/${currentBook.book_id}`);
        currentBook = await resp.json();
        await loadReaderSection();
        showScreen('reader');
    } catch (e) {
        toast('Failed to jump to chapter');
    }
    hideLoading();
}

async function continueReading() {
    showLoading('Loading...');
    try {
        await loadReaderSection();
        showScreen('reader');
    } catch (e) {
        toast('Failed to load section');
    }
    hideLoading();
}

// ---------------------------------------------------------------------------
// Reader
// ---------------------------------------------------------------------------
let currentSection = null;  // raw section data from API

async function loadReaderSection() {
    const resp = await fetch(`${OMEGA}/reading/books/${currentBook.book_id}/read?max_chars=6000`);
    currentSection = await resp.json();

    if (currentSection.done) {
        document.getElementById('pageText').innerHTML =
            '<div style="text-align:center;padding:40px;font-size:1.3em">🎉 Book complete!<br>Well done.</div>';
        document.getElementById('readerChTitle').textContent = 'Finished';
        document.getElementById('readerProgress').textContent = '100%';
        return;
    }

    document.getElementById('readerChTitle').textContent = currentSection.chapter_title;
    document.getElementById('readerProgress').textContent = `${currentSection.chapter_percent}%`;
    document.getElementById('progressFill').style.width = currentSection.chapter_percent + '%';

    // Paginate: split into pages of ~1200 chars, respecting sentence boundaries
    paginateText(currentSection.text);
    pageIndex = 0;
    renderPage();
}

function paginateText(text) {
    const PAGE_SIZE = 700;
    pages = [];
    let remaining = text;

    while (remaining.length > 0) {
        if (remaining.length <= PAGE_SIZE) {
            pages.push(remaining);
            break;
        }
        let cut = remaining.lastIndexOf('. ', PAGE_SIZE);
        if (cut < PAGE_SIZE * 0.4) cut = remaining.lastIndexOf(' ', PAGE_SIZE);
        if (cut < PAGE_SIZE * 0.3) cut = PAGE_SIZE;
        pages.push(remaining.substring(0, cut + 1).trim());
        remaining = remaining.substring(cut + 1).trim();
    }
}

function renderPage() {
    if (pages.length === 0) return;
    const text = pages[pageIndex] || '';
    // Render as plain text — will be chunked for TTS highlighting later
    document.getElementById('pageText').textContent = text;
    document.getElementById('readerProgress').textContent =
        `pg ${pageIndex + 1}/${pages.length} · ${currentSection.chapter_percent}%`;
}

function prevPage() {
    if (pageIndex > 0) {
        pageIndex--;
        renderPage();
        toast(`Page ${pageIndex + 1} of ${pages.length}`);
    }
}

function nextPage() {
    if (pageIndex < pages.length - 1) {
        pageIndex++;
        renderPage();
        toast(`Page ${pageIndex + 1} of ${pages.length}`);
    } else {
        // Advance to next section
        advanceAndLoadNext();
    }
}

async function advanceAndLoadNext() {
    if (!currentSection || currentSection.done) return;
    stopPlay();
    showLoading('Loading next section...');
    try {
        await fetch(`${OMEGA}/reading/books/${currentBook.book_id}/advance?chars_read=${currentSection.chars_in_section}`, { method: 'POST' });
        await loadReaderSection();
    } catch (e) {
        toast('Failed to advance');
    }
    hideLoading();
}

async function prevChapter() {
    const ch = (currentBook.progress?.chapter_index || 0) - 1;
    if (ch >= 0) await jumpToChapter(ch);
}

async function nextChapter() {
    const ch = (currentBook.progress?.chapter_index || 0) + 1;
    if (ch < currentBook.chapter_count) await jumpToChapter(ch);
    else toast('Already at last chapter');
}

// ---------------------------------------------------------------------------
// TTS Playback via Kokoro
// ---------------------------------------------------------------------------
async function togglePlay() {
    if (isPlaying) { stopPlay(); return; }
    isPlaying = true;
    updatePlayButton();
    await playCurrentPage();
}

function stopPlay() {
    isPlaying = false;
    if (ttsAudio) { ttsAudio.pause(); ttsAudio = null; }
    ttsChunks = [];
    ttsChunkIndex = 0;
    updatePlayButton();
    // Remove highlights
    document.querySelectorAll('.chunk.active').forEach(el => el.classList.remove('active'));
}

function updatePlayButton() {
    const btn = document.getElementById('btnPlay');
    if (isPlaying) {
        btn.textContent = '\u25A0 Stop';
        btn.classList.add('playing');
    } else {
        btn.textContent = '\u25B6 Play';
        btn.classList.remove('playing');
    }
}

async function playCurrentPage() {
    if (!isPlaying || !pages[pageIndex]) { stopPlay(); return; }

    const text = pages[pageIndex];

    // Chunk via Kokoro
    try {
        const chunkResp = await fetch(`${KOKORO}/api/chunks`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text, voice: selectedVoice }),
        });
        const chunkData = await chunkResp.json();
        ttsChunks = chunkData.chunks;
    } catch (e) {
        toast('Cannot reach Kokoro TTS');
        stopPlay();
        return;
    }

    // Render page with chunk spans for highlighting
    const pageEl = document.getElementById('pageText');
    pageEl.innerHTML = ttsChunks.map((c, i) =>
        `<span class="chunk" id="chunk-${i}">${escapeHtml(c.text)}</span> `
    ).join('');

    ttsChunkIndex = 0;
    await playNextChunk();
}

async function playNextChunk() {
    if (!isPlaying || ttsChunkIndex >= ttsChunks.length) {
        // Page done — auto-advance
        if (isPlaying) {
            // Mark all chunks as done
            document.querySelectorAll('.chunk').forEach(el => el.classList.add('done'));

            if (pageIndex < pages.length - 1) {
                pageIndex++;
                renderPage();
                await playCurrentPage();
            } else {
                // Section done — advance to next
                await advanceAndLoadNext();
                if (isPlaying && currentSection && !currentSection.done) {
                    await playCurrentPage();
                } else {
                    stopPlay();
                }
            }
        }
        return;
    }

    const chunk = ttsChunks[ttsChunkIndex];

    // Highlight current chunk
    document.querySelectorAll('.chunk.active').forEach(el => el.classList.remove('active'));
    const chunkEl = document.getElementById(`chunk-${ttsChunkIndex}`);
    if (chunkEl) {
        chunkEl.classList.add('active');
        chunkEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // Synthesize
    try {
        const resp = await fetch(`${KOKORO}/api/synthesize`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: chunk.text, voice: selectedVoice, speed: ttsSpeed }),
        });

        if (!resp.ok) { toast('TTS synthesis failed'); stopPlay(); return; }

        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        ttsAudio = new Audio(url);

        ttsAudio.onended = () => {
            URL.revokeObjectURL(url);
            if (chunkEl) {
                chunkEl.classList.remove('active');
                chunkEl.classList.add('done');
            }
            ttsChunkIndex++;
            if (isPlaying) playNextChunk();
        };

        ttsAudio.onerror = () => {
            URL.revokeObjectURL(url);
            toast('Audio playback error');
            stopPlay();
        };

        ttsAudio.play();
    } catch (e) {
        toast('TTS error: ' + e.message);
        stopPlay();
    }
}

// ---------------------------------------------------------------------------
// Voice picker
// ---------------------------------------------------------------------------
async function loadVoices() {
    try {
        const resp = await fetch(`${KOKORO}/api/voices`);
        const data = await resp.json();
        voices = data.voices;
    } catch (e) {
        voices = ['af_heart', 'af_bella', 'af_sky', 'am_adam', 'am_michael'];
    }
}

function toggleVoicePicker() {
    const picker = document.getElementById('voicePicker');
    if (picker.classList.contains('open')) {
        picker.classList.remove('open');
        return;
    }
    picker.innerHTML = voices.map(v => `
        <div class="voice-option ${v === selectedVoice ? 'selected' : ''}"
             onclick="selectVoice('${v}')">${v}</div>
    `).join('');
    picker.classList.add('open');
}

function selectVoice(v) {
    selectedVoice = v;
    document.getElementById('voicePicker').classList.remove('open');
    toast(`Voice: ${v}`);
}

function setSpeed(val) {
    ttsSpeed = parseFloat(val);
    document.getElementById('speedLabel').textContent = ttsSpeed.toFixed(1) + 'x';
}

// ---------------------------------------------------------------------------
// Summary
// ---------------------------------------------------------------------------
async function summarizeChapter() {
    if (!currentSection) return;
    showScreen('summary');
    document.getElementById('summaryContent').textContent = 'Generating summary...';

    try {
        const resp = await fetch(
            `${OMEGA}/reading/books/${currentBook.book_id}/chapters/${currentSection.chapter_index}/summarize`,
            { method: 'POST' }
        );
        const data = await resp.json();
        // Render markdown-ish content
        document.getElementById('summaryContent').innerHTML =
            data.summary
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
    } catch (e) {
        document.getElementById('summaryContent').textContent = 'Summary failed: ' + e.message;
    }
}

function escapeHtml(text) {
    const el = document.createElement('div');
    el.textContent = text;
    return el.innerHTML;
}

// ---------------------------------------------------------------------------
// Keyboard shortcuts (for testing, also works with Bluetooth keyboards)
// ---------------------------------------------------------------------------
document.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'k') { e.preventDefault(); togglePlay(); }
    if (e.key === 'ArrowRight' || e.key === 'l') nextPage();
    if (e.key === 'ArrowLeft' || e.key === 'h') prevPage();

// ---------------------------------------------------------------------------
// Voice Command (mic → STT → note agent)
// ---------------------------------------------------------------------------
// STT mode: 'browser' (Web Speech API, no GPU needed) or 'gpu' (Whisper via server)
let sttMode = localStorage.getItem('sttMode') || 'browser';
let mediaRecorder = null;
let audioChunks = [];
let speechRecognition = null;

function toggleSttMode() {
    sttMode = sttMode === 'browser' ? 'gpu' : 'browser';
    localStorage.setItem('sttMode', sttMode);
    document.getElementById('sttModeLabel').textContent = sttMode === 'browser' ? 'Browser' : 'GPU';
    toast('STT: ' + (sttMode === 'browser' ? 'Browser (no GPU needed)' : 'GPU (Whisper)'));
}
// Init label
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('sttModeLabel').textContent = sttMode === 'browser' ? 'Browser' : 'GPU';
});

async function toggleVoiceCommand() {
    const overlay = document.getElementById('voiceOverlay');
    overlay.classList.remove('hidden');
    document.getElementById('stopBtn').classList.remove('hidden');
    document.getElementById('closeBtn').classList.add('hidden');
    document.getElementById('voiceTranscript').textContent = '';
    document.getElementById('voiceResponse').textContent = '';
    document.getElementById('voiceResponse').classList.add('hidden');

    if (sttMode === 'browser') {
        startBrowserSTT();
    } else {
        startGpuSTT();
    }
}

// --- Browser STT (Web Speech API) ---
function startBrowserSTT() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        document.getElementById('voiceStatus').textContent = 'Browser STT not supported — switch to GPU mode';
        document.getElementById('closeBtn').classList.remove('hidden');
        document.getElementById('stopBtn').classList.add('hidden');
        return;
    }

    speechRecognition = new SpeechRecognition();
    speechRecognition.lang = 'en-US';
    speechRecognition.interimResults = true;
    speechRecognition.continuous = false;

    document.getElementById('voiceStatus').textContent = 'Listening...';

    speechRecognition.onresult = (event) => {
        let transcript = '';
        for (let i = 0; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }
        document.getElementById('voiceTranscript').textContent = 'You said: ' + transcript;

        // When we get a final result, process it
        if (event.results[event.results.length - 1].isFinal) {
            document.getElementById('stopBtn').classList.add('hidden');
            sendToNoteAgent(transcript.trim());
        }
    };

    speechRecognition.onerror = (e) => {
        document.getElementById('voiceStatus').textContent = 'Error: ' + e.error;
        document.getElementById('stopBtn').classList.add('hidden');
        document.getElementById('closeBtn').classList.remove('hidden');
    };

    speechRecognition.onend = () => {
        // If no final result was processed, show close
        document.getElementById('stopBtn').classList.add('hidden');
        if (!document.getElementById('voiceResponse').textContent) {
            document.getElementById('closeBtn').classList.remove('hidden');
        }
    };

    speechRecognition.start();
}

// --- GPU STT (Whisper via server) ---
async function startGpuSTT() {
    document.getElementById('voiceStatus').textContent = 'Recording...';
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        audioChunks = [];

        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
            stream.getTracks().forEach(t => t.stop());
            await processGpuSTT();
        };

        mediaRecorder.start();
    } catch (e) {
        document.getElementById('voiceStatus').textContent = 'Mic error: ' + e.message;
        document.getElementById('stopBtn').classList.add('hidden');
        document.getElementById('closeBtn').classList.remove('hidden');
    }
}

async function processGpuSTT() {
    const statusEl = document.getElementById('voiceStatus');
    const closeBtn = document.getElementById('closeBtn');

    statusEl.textContent = 'Transcribing via GPU...';
    try {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const form = new FormData();
        form.append('file', blob, 'voice.webm');
        const sttResp = await fetch(`${OMEGA}/speech/transcribe`, { method: 'POST', body: form });
        if (!sttResp.ok) {
            const errBody = await sttResp.text();
            throw new Error(`STT ${sttResp.status}: ${errBody}`);
        }
        const sttData = await sttResp.json();
        const transcript = (sttData.text || sttData.transcript || '').trim();

        if (!transcript) {
            statusEl.textContent = 'No speech detected';
            closeBtn.classList.remove('hidden');
            return;
        }

        document.getElementById('voiceTranscript').textContent = 'You said: ' + transcript;
        await sendToNoteAgent(transcript);
    } catch (e) {
        statusEl.textContent = 'Error: ' + e.message;
        closeBtn.classList.remove('hidden');
    }
}

// --- Common: send transcript to note agent ---
async function sendToNoteAgent(transcript) {
    const statusEl = document.getElementById('voiceStatus');
    const responseEl = document.getElementById('voiceResponse');
    const closeBtn = document.getElementById('closeBtn');

    if (!transcript) {
        statusEl.textContent = 'No speech detected';
        closeBtn.classList.remove('hidden');
        return;
    }

    statusEl.textContent = 'Thinking...';
    try {
        const noteResp = await fetch(`${OMEGA}/notes/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: transcript }),
        });
        if (!noteResp.ok) {
            const errBody = await noteResp.text();
            throw new Error(`Note ${noteResp.status}: ${errBody}`);
        }
        const noteData = await noteResp.json();
        const reply = noteData.response || noteData.reply || JSON.stringify(noteData);

        statusEl.textContent = 'Done';
        responseEl.textContent = reply;
        responseEl.classList.remove('hidden');
    } catch (e) {
        statusEl.textContent = 'Error: ' + e.message;
    }
    closeBtn.classList.remove('hidden');
}

function stopVoiceRecording() {
    document.getElementById('stopBtn').classList.add('hidden');
    if (sttMode === 'browser' && speechRecognition) {
        speechRecognition.stop();
    } else if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        document.getElementById('voiceStatus').textContent = 'Transcribing...';
        mediaRecorder.stop();
    }
}

function closeVoiceOverlay() {
    document.getElementById('voiceOverlay').classList.add('hidden');
    if (speechRecognition) { try { speechRecognition.abort(); } catch(e) {} speechRecognition = null; }
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
}

// ---------------------------------------------------------------------------
// Upload
// ---------------------------------------------------------------------------
async function uploadBook(file) {
    if (!file) return;
    showLoading('Processing EPUB...');
    const form = new FormData();
    form.append('file', file);
    try {
        const resp = await fetch(`${OMEGA}/reading/upload`, { method: 'POST', body: form });
        if (!resp.ok) throw new Error(await resp.text());
        toast('Book uploaded!');
        await loadBooks();
    } catch (e) {
        toast('Upload failed: ' + e.message);
    }
    hideLoading();
    document.getElementById('epubUpload').value = '';
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
loadBooks();
loadVoices();
