<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmegaReader — Manage Books</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; }

        .container { max-width: 720px; margin: 0 auto; padding: 24px; }

        h1 { color: #58a6ff; margin-bottom: 8px; }
        .subtitle { color: #8b949e; margin-bottom: 32px; }

        /* Upload area */
        .upload-area {
            border: 2px dashed #30363d; border-radius: 12px; padding: 40px;
            text-align: center; cursor: pointer; transition: border-color 0.2s;
            margin-bottom: 32px;
        }
        .upload-area:hover, .upload-area.dragover { border-color: #58a6ff; background: #161b22; }
        .upload-area h3 { color: #e6edf3; margin-bottom: 8px; }
        .upload-area p { color: #8b949e; font-size: 0.9em; }
        .upload-area input { display: none; }

        /* Book list */
        h2 { color: #e6edf3; margin-bottom: 16px; font-size: 1.1em; }
        .book-card {
            background: #161b22; border: 1px solid #30363d; border-radius: 10px;
            padding: 16px 20px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 16px;
        }
        .book-info { flex: 1; }
        .book-info h3 { color: #e6edf3; margin-bottom: 4px; }
        .book-info .meta { color: #8b949e; font-size: 0.85em; }
        .book-info .progress-bar {
            margin-top: 6px; height: 4px; background: #21262d; border-radius: 2px; overflow: hidden; max-width: 200px;
        }
        .book-info .progress-fill { height: 100%; background: #238636; border-radius: 2px; }
        .delete-btn {
            background: none; border: 1px solid #30363d; color: #8b949e;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85em;
        }
        .delete-btn:hover { border-color: #da3633; color: #da3633; }

        .empty { color: #8b949e; text-align: center; padding: 40px; }

        /* Status toast */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: #30363d; color: #e6edf3; padding: 10px 24px;
            border-radius: 8px; font-size: 0.9em; opacity: 0; transition: opacity 0.3s;
            pointer-events: none; z-index: 100;
        }
        .toast.show { opacity: 1; }

        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #30363d;
            border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <h1>📚 OmegaReader — Manage Books</h1>
    <p class="subtitle">Upload EPUBs here. They'll appear on the RPi reading kiosk automatically.</p>

    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".epub" multiple onchange="uploadFiles(this.files)">
        <h3>📤 Drop EPUB files here or click to browse</h3>
        <p>Supports multiple files</p>
    </div>

    <h2>Your Library</h2>
    <div id="bookList"><div class="empty">Loading...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.origin;

function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
}

// Drag and drop
const area = document.getElementById('uploadArea');
area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('dragover'); });
area.addEventListener('dragleave', () => area.classList.remove('dragover'));
area.addEventListener('drop', e => {
    e.preventDefault();
    area.classList.remove('dragover');
    const files = [...e.dataTransfer.files].filter(f => f.name.endsWith('.epub'));
    if (files.length) uploadFiles(files);
    else toast('Only .epub files are supported');
});

async function uploadFiles(files) {
    for (const file of files) {
        area.innerHTML = `<div class="spinner"></div><p>Uploading ${file.name}...</p>`;
        try {
            const form = new FormData();
            form.append('file', file);
            const resp = await fetch(`${API}/reading/upload`, { method: 'POST', body: form });
            if (!resp.ok) throw new Error(await resp.text());
            toast(`✓ ${file.name} uploaded`);
        } catch (e) {
            toast(`✗ ${file.name}: ${e.message}`);
        }
    }
    area.innerHTML = `<input type="file" id="fileInput" accept=".epub" multiple onchange="uploadFiles(this.files)">
        <h3>📤 Drop EPUB files here or click to browse</h3><p>Supports multiple files</p>`;
    document.getElementById('fileInput').style.display = 'none';
    loadBooks();
}

async function loadBooks() {
    try {
        const resp = await fetch(`${API}/reading/books`);
        const data = await resp.json();
        const list = document.getElementById('bookList');

        if (!data.books.length) {
            list.innerHTML = '<div class="empty">No books yet. Upload an EPUB above.</div>';
            return;
        }

        list.innerHTML = data.books.map(b => `
            <div class="book-card">
                <div class="book-info">
                    <h3>${b.title}</h3>
                    <div class="meta">${b.author} · ${b.chapter_count} chapters · ${b.total_words.toLocaleString()} words</div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${b.progress.percent}%"></div></div>
                    <div class="meta">${b.progress.percent}% complete</div>
                </div>
                <button class="delete-btn" onclick="deleteBook('${b.book_id}', '${b.title.replace(/'/g, "\\'")}')">Delete</button>
            </div>
        `).join('');
    } catch (e) {
        document.getElementById('bookList').innerHTML = '<div class="empty">Cannot connect to server.</div>';
    }
}

async function deleteBook(id, title) {
    if (!confirm(`Delete "${title}"? This removes all progress and summaries.`)) return;
    try {
        const resp = await fetch(`${API}/reading/books/${id}`, { method: 'DELETE' });
        if (resp.ok) { toast('Deleted'); loadBooks(); }
        else toast('Delete failed');
    } catch (e) { toast('Delete failed'); }
}

loadBooks();
</script>
</body>
</html>
