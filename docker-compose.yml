services:
  omega-agent:
    build: .
    container_name: omega-agent
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ${VAULT_HOST_PATH:-./vault}:/app/vault
      - ./voices:/app/voices
      - ./books:/app/books
    environment:
      - OBSIDIAN_VAULT_PATH=/app/vault
      - BOOKS_DIR=/app/books
      - TZ=America/Los_Angeles
