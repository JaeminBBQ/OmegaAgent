[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:embeddings]
command=python embeddings_server.py
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/embeddings.err.log
stdout_logfile=/var/log/supervisor/embeddings.out.log

[program:kokoro]
command=python kokoro_server.py
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/kokoro.err.log
stdout_logfile=/var/log/supervisor/kokoro.out.log
