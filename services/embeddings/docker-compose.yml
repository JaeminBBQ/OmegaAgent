version: '3.8'

services:
  ai-services:
    build: .
    container_name: omega-ai-services
    ports:
      - "8081:8081"  # Kokoro TTS
      - "8082:8082"  # Embeddings
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    environment:
      - CUDA_VISIBLE_DEVICES=0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/v1/health && curl -f http://localhost:8082/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
